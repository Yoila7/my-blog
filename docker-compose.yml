services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: my-blog-backend
    container_name: blog-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      # 持久化 SQLite 数据库
      - ./data:/app/data
      # 挂载 .env 以便运行时修改配置无需重新构建镜像
      - ./server/.env:/app/.env:ro
    environment:
      # 覆盖 .env 中的配置，适配 Docker 环境
      - DB_PATH=/app/data/blog.db
      - SERVER_URL=http://10.196.231.244
      - FRONTEND_URL=http://10.196.231.244
      - HTTPS_PROXY=http://host.docker.internal:7890
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - NEXT_PUBLIC_API_URL=
        - API_URL=http://backend:8080
    image: my-blog-frontend
    container_name: blog-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: blog-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
